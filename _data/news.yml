items:
  - text: >-
      **Jan 26:** I am an organizer of the [NYC Ops day 2026](https://sites.google.com/stern.nyu.edu/nyc-ops-day-2026/home). You should come!
  - text: >-
      **Oct 25:** I will be giving a talk at [DR&D](https://www.drd2025.org/) about my new sortition algorithm and the updated version of the panelot platform that I've been building together with [Carmel Baharav](https://www.carmelbaharav.com/), [Bailey Flanigan](https://sites.google.com/mit.edu/bailey-flanigan/home), and [Paul Gölz](https://paulgoelz.de/).
  - text: >-
      **Aug 25:** I will be presenting a poster on my work on sortition at [YinzOR](https://yinzor.cmuinforms.org/).
  - text: >-
      **Mar 25:** I will be presenting a poster on my work on approximation algorithms for the 2-edge-connected spanning subgraph problem at the [NYC Ops day 2025](https://sites.google.com/stern.nyu.edu/nyc-ops-day-2025/home).